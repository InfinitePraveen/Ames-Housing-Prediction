<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ames Housing Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h2 class="text-center mb-0">🏠 Ames Housing Price Predictor</h2>
                    </div>
                    <div class="card-body">
                        <p class="text-muted text-center">
                            Enter the property details below to get a predicted sale price.
                        </p>
                        
                        <form id="prediction-form">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="overall_qual" class="form-label">Overall Quality (1-10)</label>
                                    <input type="number" class="form-control" id="overall_qual" 
                                           min="1" max="10" value="6" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="gr_liv_area" class="form-label">Above Ground Living Area (sq ft)</label>
                                    <input type="number" class="form-control" id="gr_liv_area" 
                                           min="300" max="5000" value="1500" required>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="year_built" class="form-label">Year Built</label>
                                    <input type="number" class="form-control" id="year_built" 
                                           min="1870" max="2026" value="2000" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="total_bsmt_sf" class="form-label">Total Basement Area (sq ft)</label>
                                    <input type="number" class="form-control" id="total_bsmt_sf" 
                                           min="0" max="5000" value="1000" required>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="garage_area" class="form-label">Garage Area (sq ft)</label>
                                    <input type="number" class="form-control" id="garage_area" 
                                           min="0" max="2000" value="400" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="bedrooms" class="form-label">Number of Bedrooms</label>
                                    <input type="number" class="form-control" id="bedrooms" 
                                           min="0" max="10" value="3" required>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="full_bath" class="form-label">Full Bathrooms</label>
                                    <input type="number" class="form-control" id="full_bath" 
                                           min="0" max="5" value="2" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="half_bath" class="form-label">Half Bathrooms</label>
                                    <input type="number" class="form-control" id="half_bath" 
                                           min="0" max="3" value="1" required>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="lot_area" class="form-label">Lot Area (sq ft)</label>
                                    <input type="number" class="form-control" id="lot_area" 
                                           min="1000" max="100000" value="10000" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="tot_rms" class="form-label">Total Rooms Above Ground</label>
                                    <input type="number" class="form-control" id="tot_rms" 
                                           min="1" max="20" value="6" required>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="neighborhood" class="form-label">Neighborhood</label>
                                    <select class="form-select" id="neighborhood">
                                        <option value="NAmes">NAmes</option>
                                        <option value="Gilbert">Gilbert</option>
                                        <option value="StoneBr">StoneBr</option>
                                        <option value="Somerst">Somerst</option>
                                        <option value="NridgHt">NridgHt</option>
                                        <option value="NoRidge">NoRidge</option>
                                        <option value="OldTown">OldTown</option>
                                        <option value="Sawyer">Sawyer</option>
                                        <option value="SawyerW">SawyerW</option>
                                        <option value="Crawfor">Crawfor</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="sale_condition" class="form-label">Sale Condition</label>
                                    <select class="form-select" id="sale_condition">
                                        <option value="Normal">Normal</option>
                                        <option value="Abnorml">Abnorml</option>
                                        <option value="Family">Family</option>
                                        <option value="Partial">Partial</option>
                                        <option value="New">New</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg" id="predict-btn">
                                    🔮 Predict Price
                                </button>
                            </div>
                        </form>
                        
                        <div id="result-section" class="mt-4" style="display: none;">
                            <div class="card bg-light">
                                <div class="card-body text-center">
                                    <h4>Predicted Sale Price</h4>
                                    <h2 class="display-4 text-success" id="prediction-result">$0.00</h2>
                                    <p class="text-muted">Confidence: <span id="confidence">95%</span></p>
                                </div>
                            </div>
                        </div>
                        
                        <div id="error-section" class="mt-4" style="display: none;">
                            <div class="alert alert-danger" id="error-message"></div>
                        </div>
                    </div>
                    <div class="card-footer text-muted text-center">
                        Built with Flask & XGBoost • Ames Housing Dataset
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
